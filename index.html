<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shooter Timer</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23333' width='100' height='100'/><g fill='%234CAF50'><rect x='10' y='45' width='50' height='12' rx='2'/><rect x='55' y='40' width='8' height='25' rx='2'/><circle cx='75' cy='52' r='8'/><rect x='85' y='48' width='12' height='8' rx='1'/></g><circle cx='50' cy='25' r='4' fill='%23FFD700' opacity='0.8'/><circle cx='50' cy='25' r='2.5' fill='%23FF4444'/></svg>">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #333;
            color: white;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .burger-menu {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            flex-grow: 1;
            margin-left: 10px;
        }
        .app-icon {
            font-size: 28px;
            margin-right: 8px;
            display: inline-block;
        }
        .menu-placeholder {
            width: 40px;
        }
        .menu {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }
        .menu.open {
            display: block;
        }
        .menu-content {
            position: absolute;
            left: 0;
            top: 0;
            width: 250px;
            height: 100%;
            background-color: white;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.2);
            padding: 20px 0;
            overflow-y: auto;
        }
        .menu-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            width: 100%;
            text-align: right;
            padding: 15px 20px;
            margin-bottom: 20px;
        }
        .menu-section {
            padding: 0 20px;
            margin-bottom: 20px;
            text-align: left;
        }
        .menu-section h3 {
            margin: 10px 0 15px 0;
            font-size: 16px;
            color: #333;
        }
        .menu-input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .menu-button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background-color: #4CAF50;
            border: none;
            color: white;
            text-align: center;
            text-decoration: none;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
        }
        .menu-button:disabled {
            background-color: #cccccc;
        }
        .menu-button.danger {
            background-color: #f44336;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin-top: 10px;
        }
        button {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 12px 24px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 10px 5px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:disabled {
            background-color: #cccccc;
        }
        input, select {
            padding: 10px;
            margin: 10px 0;
            width: 80%;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        #timer {
            font-size: 48px;
            margin: 20px 0;
            font-weight: bold;
        }
        #leaderboard {
            margin-top: 20px;
            text-align: left;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .latest {
            background-color: #ffeb3b;
        }
        .shooter-controls {
            margin-bottom: 15px;
        }
        @media (max-width: 600px) {
            .container {
                margin-top: 0;
                border-radius: 0;
                box-shadow: none;
                padding: 15px;
            }
            body {
                padding: 0;
            }
            input, select {
                width: 90%;
            }
            button {
                padding: 10px 20px;
                font-size: 14px;
                margin: 8px 3px;
            }
            #timer {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="burger-menu" id="burgerBtn">☰</button>
        <h1><span class="app-icon">🔫</span> Shooter Timer</h1>
        <div class="menu-placeholder"></div>
    </div>

    <div class="menu" id="menu">
        <div class="menu-content">
            <button class="menu-close" id="closeMenuBtn">✕</button>
            
            <div class="menu-section">
                <h3>Add Shooter</h3>
                <input type="text" id="newShooter" class="menu-input" placeholder="Shooter name">
                <button id="addShooterBtn" class="menu-button">Add Shooter</button>
            </div>

            <hr style="margin: 20px 0; border: none; border-top: 1px solid #ddd;">

            <div class="menu-section">
                <h3>Full Reset</h3>
                <p style="font-size: 12px; color: #666; margin: 0 0 10px 0;">Clear all shooters and times</p>
                <button id="fullResetBtn" class="menu-button danger">Full Reset (Clear All)</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="shooter-controls">
            <select id="shooterSelect">
                <option value="">-- Select Shooter --</option>
            </select>
            <input type="number" id="countdown" placeholder="Countdown (seconds)" value="3" min="1">
        </div>

        <div>
            <button id="startBtn">Start</button>
            <button id="stopBtn" disabled>Stop</button>
            <button id="resetBtn">Reset</button>
        </div>

        <div id="timer">0.00</div>
        <audio id="beep" preload="auto"></audio>

        <h2>Leaderboard</h2>
        <div id="leaderboard">
            <table id="leaderboardTable">
                <thead>
                    <tr>
                        <th>Place</th>
                        <th>Shooter</th>
                        <th>Time (s)</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <!-- Leaderboard entries will be added here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // DOM elements
        const burgerBtn = document.getElementById('burgerBtn');
        const menu = document.getElementById('menu');
        const closeMenuBtn = document.getElementById('closeMenuBtn');
        const shooterSelect = document.getElementById('shooterSelect');
        const newShooterInput = document.getElementById('newShooter');
        const addShooterBtn = document.getElementById('addShooterBtn');
        const countdownInput = document.getElementById('countdown');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resetBtn = document.getElementById('resetBtn');
        const fullResetBtn = document.getElementById('fullResetBtn');
        const timerDisplay = document.getElementById('timer');
        const beep = document.getElementById('beep');
        const leaderboardBody = document.getElementById('leaderboardBody');

        // Menu toggle functions
        function openMenu() {
            menu.classList.add('open');
        }

        function closeMenu() {
            menu.classList.remove('open');
        }

        // Event listeners for menu
        burgerBtn.addEventListener('click', () => {
            if (menu.classList.contains('open')) {
                closeMenu();
            } else {
                openMenu();
            }
        });
        closeMenuBtn.addEventListener('click', closeMenu);
        menu.addEventListener('click', (e) => {
            if (e.target === menu) {
                closeMenu();
            }
        });

        // Base64 beep sound (works in all browsers)
        const beepSound = "data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU...";

        // Variables
        let countdownInterval;
        let timerInterval;
        let startTime;
        let isRunning = false;
        let shooters = JSON.parse(localStorage.getItem('shooters')) || [];
        let attempts = JSON.parse(localStorage.getItem('shooterAttempts')) || {};
        let latestAttempts = JSON.parse(localStorage.getItem('latestAttempts')) || {};

        // Initialize shooter dropdown
        function updateShooterDropdown() {
            shooterSelect.innerHTML = '<option value="">-- Select Shooter --</option>';
            shooters.forEach(shooter => {
                const option = document.createElement('option');
                option.value = shooter;
                option.textContent = shooter;
                shooterSelect.appendChild(option);
            });
        }

        // Load leaderboard (sorted by fastest time across all shooters)
        function loadLeaderboard() {
            leaderboardBody.innerHTML = '';
            // Collect all attempts with shooter info
            const allAttempts = [];
            for (const [shooter, times] of Object.entries(attempts)) {
                times.forEach((time, index) => {
                    allAttempts.push({
                        shooter: shooter,
                        time: time,
                        isLatest: index === times.length - 1
                    });
                });
            }
            // Sort all attempts by time (fastest first)
            allAttempts.sort((a, b) => a.time - b.time);
            // Add to leaderboard
            allAttempts.forEach((attempt, index) => {
                const row = document.createElement('tr');
                if (attempt.isLatest) {
                    row.classList.add('latest');
                }
                row.innerHTML = `<td>${index + 1}.</td><td>${attempt.shooter}</td><td>${attempt.time.toFixed(2)}</td>`;
                leaderboardBody.appendChild(row);
            });
        }

        // Start countdown
        function startCountdown() {
            const countdownSeconds = parseInt(countdownInput.value);
            let remaining = countdownSeconds;
            timerDisplay.textContent = remaining.toFixed(2);

            countdownInterval = setInterval(() => {
                remaining -= 0.01;
                timerDisplay.textContent = remaining.toFixed(2);

                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    beep.src = beepSound;
                    beep.play().catch(e => {
                        // Fallback if audio fails
                        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                        const oscillator = audioContext.createOscillator();
                        oscillator.type = 'sine';
                        oscillator.frequency.setValueAtTime(1000, audioContext.currentTime);
                        oscillator.connect(audioContext.destination);
                        oscillator.start();
                        oscillator.stop(audioContext.currentTime + 0.5);
                    });
                    startTimer();
                }
            }, 10);
        }

        // Start timer
        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = (Date.now() - startTime) / 1000;
                timerDisplay.textContent = elapsed.toFixed(2);
            }, 10);
        }

        // Stop timer
        function stopTimer() {
            clearInterval(timerInterval);
            const elapsed = parseFloat(timerDisplay.textContent);
            const currentShooter = shooterSelect.value;

            if (currentShooter) {
                if (!attempts[currentShooter]) {
                    attempts[currentShooter] = [];
                }
                attempts[currentShooter].push(elapsed);
                localStorage.setItem('shooterAttempts', JSON.stringify(attempts));
                loadLeaderboard();
            }

            isRunning = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        // Reset timer
        function resetTimer() {
            clearInterval(countdownInterval);
            clearInterval(timerInterval);
            timerDisplay.textContent = '0.00';
            isRunning = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        // Full reset (clear all local storage)
        function fullReset() {
            if (confirm("Are you sure you want to clear all shooters and times?")) {
                localStorage.clear();
                shooters = [];
                attempts = {};
                updateShooterDropdown();
                loadLeaderboard();
                timerDisplay.textContent = '0.00';
                closeMenu();
                alert("All data has been cleared.");
            }
        }

        // Add new shooter
        addShooterBtn.addEventListener('click', () => {
            const newShooter = newShooterInput.value.trim();
            if (newShooter && !shooters.includes(newShooter)) {
                shooters.push(newShooter);
                localStorage.setItem('shooters', JSON.stringify(shooters));
                updateShooterDropdown();
                newShooterInput.value = '';
                closeMenu();
            }
        });

        // Event listeners
        startBtn.addEventListener('click', () => {
            if (!isRunning && shooterSelect.value && countdownInput.value > 0) {
                isRunning = true;
                startBtn.disabled = true;
                stopBtn.disabled = false;
                startCountdown();
            }
        });

        stopBtn.addEventListener('click', stopTimer);
        resetBtn.addEventListener('click', resetTimer);
        fullResetBtn.addEventListener('click', fullReset);

        // Initialize
        updateShooterDropdown();
        loadLeaderboard();
    </script>
</body>
</html>
